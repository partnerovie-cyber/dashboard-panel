<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="100%">
  <defs>
    <filter id="glass-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.15"/>
    </filter>

    <linearGradient id="obsidian-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.80"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.95"/>
    </linearGradient>
    
    <linearGradient id="chart-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0.00"/>
    </linearGradient>
    
    <radialGradient id="core-hub-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#1e1b4b" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#030712" stop-opacity="0"/>
      <animate attributeName="r" values="0.55;0.65;0.55" dur="6s" repeatCount="indefinite"/>
    </radialGradient>
    
    <pattern id="cyber-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#334155" stroke-width="1" stroke-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1000" height="540" rx="24" fill="#030712" stroke="#1e1b4b" stroke-width="2"/>
  <rect width="1000" height="540" rx="24" fill="url(#core-hub-glow)"/>
  <rect width="1000" height="540" rx="24" fill="url(#cyber-grid)"/>
  
  <line x1="-150" y1="0" x2="-150" y2="540" stroke="#4f46e5" stroke-width="2" stroke-opacity="0.08">
    <animate attributeName="x1" values="-150;1150" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="-150;1150" dur="5s" repeatCount="indefinite"/>
  </line>
  
  <g transform="translate(45, 45)">
    <rect width="56" height="56" rx="16" fill="#1e1b4b" fill-opacity="0.6" stroke="#4f46e5" stroke-width="2"/>
    <path d="M19 38v-3c0-2.2 1.8-4 4-4h10c2.2 0 4 1.8 4 4v3M28 25a4.5 4.5 0 100-9 4.5 4.5 0 000 9z" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="78" y="23" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="28" font-weight="900" letter-spacing="-0.5">__MINISTRY_NAME__</text>
    <text x="78" y="46" fill="#64748B" font-family="system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.5">__SESSION_TITLE__</text>
  </g>
  
  <g transform="translate(755, 54)">
    <rect width="200" height="36" rx="18" fill="#022c22" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="22" cy="18" r="6" fill="#10b981" fill-opacity="0.2">
      <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="22" cy="18" r="3" fill="#34d399">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="40" y="23" fill="#34d399" font-family="system-ui, sans-serif" font-size="13" font-weight="900" letter-spacing="0.5">__SESSION_STATUS__</text>
  </g>
  
  <line x1="45" y1="130" x2="955" y2="130" stroke="#1e1b4b" stroke-width="2"/>
  
  <g transform="translate(45, 170)" filter="url(#glass-glow)">
    <rect width="220" height="325" rx="20" fill="url(#obsidian-glass)" stroke="#1e1b4b" stroke-width="1.5"/>
    <rect width="220" height="325" rx="20" fill="none" stroke="#4f46e5" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="40 120"/>
    <circle cx="110" cy="125" r="72" fill="none" stroke="#0f172a" stroke-width="14"/>
    
    <circle cx="110" cy="125" r="72" fill="none" stroke="#6366f1" stroke-width="14" stroke-linecap="round" stroke-dasharray="452" stroke-dashoffset="452">
      <animate attributeName="stroke-dashoffset" to="__DASH_OFFSET_VALUE__" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </circle>
    
    <text x="110" y="137" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="38" font-weight="900" letter-spacing="-1">__ATTENDANCE_PCT__%</text>
    <text x="110" y="250" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="13" font-weight="800" letter-spacing="0.5">CURRENT RATE</text>
  </g>
    
  <g transform="translate(295, 170)" filter="url(#glass-glow)">
    <rect width="410" height="325" rx="20" fill="url(#obsidian-glass)" stroke="#1e1b4b" stroke-width="1.5"/>
    <rect width="410" height="325" rx="20" fill="none" stroke="#a855f7" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="60 140"/>
    <line x1="20" y1="65" x2="390" y2="65" stroke="#ffffff" stroke-opacity="0.03" stroke-dasharray="4 4"/>
    <line x1="20" y1="135" x2="390" y2="135" stroke="#ffffff" stroke-opacity="0.03" stroke-dasharray="4 4"/>
    <line x1="20" y1="205" x2="390" y2="205" stroke="#ffffff" stroke-opacity="0.03" stroke-dasharray="4 4"/>
    
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.1s" fill="freeze"/>
      <path d="M 35 __Y1__ S 145 __Y2__ 255 __Y3__ S 335 __Y3__ 375 __Y4__ L 375 250 L 35 250 Z" fill="url(#chart-fill)"/>
      <path d="M 35 __Y1__ S 145 __Y2__ 255 __Y3__ S 335 __Y3__ 375 __Y4__" fill="none" stroke="#6366f1" stroke-width="12" stroke-opacity="0.15" stroke-linecap="round"/>
      <path d="M 35 __Y1__ S 145 __Y2__ 255 __Y3__ S 335 __Y3__ 375 __Y4__" fill="none" stroke="#6366f1" stroke-width="6" stroke-opacity="0.4" stroke-linecap="round"/>
      <path d="M 35 __Y1__ S 145 __Y2__ 255 __Y3__ S 335 __Y3__ 375 __Y4__" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      
      <path d="M 35 __Y1__ S 145 __Y2__ 255 __Y3__ S 335 __Y3__ 375 __Y4__" fill="none" stroke="#a855f7" stroke-width="3" stroke-dasharray="30 150" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" values="180;0" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <g transform="translate(375, __Y4__)">
      <circle cx="0" cy="0" r="14" fill="#6366f1" fill-opacity="0.2">
        <animate attributeName="r" values="9;15;9" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="7" fill="#6366f1" fill-opacity="0.7"/>
      <circle cx="0" cy="0" r="3.5" fill="#FFFFFF"/>
    </g>
    
    <g transform="translate(25, 270)">
      <rect width="90" height="26" rx="13" fill="__TREND_BG__" stroke="__TREND_BORDER__" stroke-width="1.5"/>
      <path d="__TREND_ARROW__" stroke="__TREND_BORDER__" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="32" y="17" fill="__TREND_TEXT_COLOR__" font-family="system-ui, sans-serif" font-size="13" font-weight="900">__TREND_VAL__%</text>
    </g>
    <text x="130" y="288" fill="#475569" font-family="system-ui, sans-serif" font-size="12" font-weight="800" letter-spacing="0.5">REAL-TIME NETWORK METRIC</text>
  </g>
    
  <g transform="translate(735, 170)" filter="url(#glass-glow)">
    <g transform="translate(0, 0)">
      <rect width="220" height="94" rx="18" fill="url(#obsidian-glass)" stroke="#1e1b4b" stroke-width="1.5"/>
      <text x="22" y="54" fill="#10b981" font-family="system-ui, sans-serif" font-size="36" font-weight="900">__LATEST_PRESENT__</text>
      <text x="22" y="80" fill="#64748B" font-family="system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="0.5">PRESENT MEMBERS</text>
      <circle cx="195" cy="47" r="4" fill="#10b981"/>
    </g>
    <g transform="translate(0, 115)">
      <rect width="220" height="94" rx="18" fill="url(#obsidian-glass)" stroke="#1e1b4b" stroke-width="1.5"/>
      <text x="22" y="54" fill="#f43f5e" font-family="system-ui, sans-serif" font-size="36" font-weight="900">__LATEST_ABSENT__</text>
      <text x="22" y="80" fill="#64748B" font-family="system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="0.5">TOTAL ABSENTEES</text>
      <circle cx="195" cy="47" r="4" fill="#f43f5e"/>
    </g>
    <g transform="translate(0, 230)">
      <rect width="220" height="94" rx="18" fill="url(#obsidian-glass)" stroke="#1e1b4b" stroke-width="1.5"/>
      <text x="22" y="54" fill="#6366f1" font-family="system-ui, sans-serif" font-size="36" font-weight="900">__TOTAL_MEMBERS__</text>
      <text x="22" y="80" fill="#64748B" font-family="system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="0.5">MASTER ROSTER SIZE</text>
      <circle cx="195" cy="47" r="4" fill="#6366f1"/>
    </g>
  </g>
</svg>
